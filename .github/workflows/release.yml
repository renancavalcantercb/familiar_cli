name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -o dist/familiar-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build -o dist/familiar-linux-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -o dist/familiar-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -o dist/familiar-darwin-arm64 .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
